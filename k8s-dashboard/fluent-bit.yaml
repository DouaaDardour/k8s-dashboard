apiVersion: v1
kind: Namespace
metadata:
  name: fluent-bit
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: fluent-bit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit-read
rules:
- apiGroups: [""]
  resources:
  - namespaces
  - pods
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit-read
subjects:
- kind: ServiceAccount
  name: fluent-bit
  namespace: fluent-bit
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: fluent-bit
  labels:
    k8s-app: fluent-bit
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    [INPUT]
        Name              tail
        Tag               modsec.*
        Path              /var/log/modsec_audit.log
        DB                /var/log/flb_modsec.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  5

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_processed
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    [FILTER]
        Name    lua
        Match   *
        script  filter.lua
        call    cb_filter

    [OUTPUT]
        Name          http
        Match         *
        Host          cupid-nucleus-geologic.ngrok-free.dev
        Port          443
        URI           /logs/ingest
        Header        Authorization Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJmbHVlbnQtYml0IiwidHlwZSI6ImFjY2VzcyIsImV4cCI6MjA5MDc3Mjk0OX0.GOVm_pDR23cbZQw_8lAEisK10VMeWrhgtjjSYYWXK38
        Format        json
        tls           On
        tls.verify    Off

  parsers.conf: |
    [PARSER]
        Name   json
        Format json
        Time_Key time
        Time_Format %d/%b/%Y:%H:%M:%S %z

    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

  filter.lua: |
    -- Extraction intelligente des champs depuis les logs K8s et ModSecurity WAF
    function cb_filter(tag, timestamp, record)
        local new_record = {}

        -- ─── Extraction namespace & pod ───
        if record["kubernetes"] ~= nil then
            new_record["namespace"] = record["kubernetes"]["namespace_name"] or "unknown"
            new_record["pod_name"] = record["kubernetes"]["pod_name"] or "unknown"
            new_record["container_name"] = record["kubernetes"]["container_name"] or ""
        else
            new_record["namespace"] = "ingress-nginx"
            new_record["pod_name"] = "ingress-nginx-controller"
        end

        -- ─── Extraction du message ───
        local msg = ""
        if record["log"] ~= nil then
            msg = record["log"]
        elseif record["message"] ~= nil then
            msg = record["message"]
        else
            msg = "empty message"
        end
        new_record["message"] = msg

        -- ─── Extraction source_ip (depuis logs ModSecurity / access logs) ───
        -- Format ModSecurity: [client 192.168.1.100]
        local ip = string.match(msg, "%[client%s+(%d+%.%d+%.%d+%.%d+)%]")
        if ip == nil then
            -- Format access log standard: IP en début de ligne
            ip = string.match(msg, "^(%d+%.%d+%.%d+%.%d+)%s")
        end
        if ip == nil then
            -- Format X-Forwarded-For header dans les logs
            ip = string.match(msg, "X%-Forwarded%-For:%s*(%d+%.%d+%.%d+%.%d+)")
        end
        new_record["source_ip"] = ip

        -- ─── Détection du log_level ───
        new_record["log_level"] = "INFO"
        local upper_msg = string.upper(msg)
        if string.find(upper_msg, "CRITICAL") or string.find(upper_msg, "EMERGENCY") then
            new_record["log_level"] = "CRITICAL"
        elseif string.find(upper_msg, "ERROR") or string.find(upper_msg, "DENIED") or string.find(upper_msg, "BLOCKED") then
            new_record["log_level"] = "ERROR"
        elseif string.find(upper_msg, "WARN") or string.find(upper_msg, "ALERT") then
            new_record["log_level"] = "WARNING"
        end

        return 1, timestamp, new_record
    end
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: fluent-bit
  labels:
    k8s-app: fluent-bit-logging
    version: v1
    kubernetes.io/cluster-service: "true"
spec:
  selector:
    matchLabels:
      k8s-app: fluent-bit-logging
  template:
    metadata:
      labels:
        k8s-app: fluent-bit-logging
        version: v1
        kubernetes.io/cluster-service: "true"
    spec:
      serviceAccountName: fluent-bit
      tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - operator: "Exists"
        effect: "NoExecute"
      - operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: fluent-bit
        image: fluent/fluent-bit:2.1.8
        imagePullPolicy: Always
        ports:
          - containerPort: 2020
        volumeMounts:
        - name: varlog
          mountPath: /var/log
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: fluent-bit-config
          mountPath: /fluent-bit/etc/
      terminationGracePeriodSeconds: 10
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: fluent-bit-config
        configMap:
          name: fluent-bit-config
