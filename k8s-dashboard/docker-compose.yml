services:

  postgres:
    image: postgres:15-alpine
    container_name: k8s_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: k8s_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: k8s_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: k8s_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/k8s_platform
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml-service:8001
      JWT_SECRET: change-me-in-production-use-32-chars-minimum
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      RISK_THRESHOLD_MEDIUM: 26
      RISK_THRESHOLD_HIGH: 51
      RISK_THRESHOLD_CRITICAL: 76
      IR_DELAY_IMMEDIATE: 0
      IR_DELAY_ML_DETECTION: 120
      IR_DELAY_ROLLBACK: 300
      CIRCUIT_BREAKER_FAIL_THRESHOLD: 3
      CIRCUIT_BREAKER_RESET_TIMEOUT: 300
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ml-service:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: k8s_ml
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./ml:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: k8s_celery
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/k8s_platform
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml-service:8001
      JWT_SECRET: change-me-in-production-use-32-chars-minimum
      CIRCUIT_BREAKER_FAIL_THRESHOLD: 3
      CIRCUIT_BREAKER_RESET_TIMEOUT: 300
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.services.celery_app worker --loglevel=info --concurrency=4

  flower:
    image: mher/flower:2.0
    container_name: k8s_flower
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_PORT: 5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery-worker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: k8s_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  postgres_data:
